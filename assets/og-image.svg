<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <style>
      .bg { fill: #070a12; }
      .title { font-family: 'Inter', sans-serif; font-size: 56px; font-weight:700; fill: #ffffff }
      .subtitle { font-family: 'Inter', sans-serif; font-size: 22px; fill: rgba(255,255,255,0.85) }
      .accent { fill: url(#g); }
    </style>
  </defs>
  <rect class="bg" width="1200" height="630" rx="24"/>
  <g transform="translate(80,160)">
    <text class="title">Cozy Gamer</text>
    <g transform="translate(0,70)">
      <text class="subtitle">Mods, mapas, shaders y herramientas para gamers</text>
    </g>
    <rect x="0" y="120" width="420" height="6" class="accent" rx="3" />
  </g>
</svg>